<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h1 class="main-title">Leetcode Tracker</h1>
  <p id="loading" class="page"></p>

  <p id="output" class="page"></p>

  <!-- LOGIN -->
  <div id="login" class="page">
    <form id="loginForm">
      <h2>Log in</h2>

      <label for="login-username">Username</label><br />
      <input id="login-username" type="text" required /><br />

      <label for="login-password">Password</label><br />
      <input id="login-password" type="password" required /><br />

      <button type="submit">Log in</button>
      <div id="login-msg"></div>
    </form>

    <div style="margin-top: 15px;">
      Don't have an account? 
      <a href="#" id="goto-signup">Sign up</a>
    </div>
  </div>

  <!-- SIGNUP -->
  <div id="signup" class="page">
    <form id="signupForm">
      <h2>Sign up</h2>

      <label for="signup-username">Username</label><br />
      <input id="signup-username" type="text" required /><br />

      <label for="signup-password">Password</label><br />
      <input id="signup-password" type="password" required /><br />

      <button type="submit">Sign up</button>
      <div id="signup-msg"></div>
    </form>

    <div style="margin-top: 15px;">
      Already have an account? 
      <a href="#" id="goto-login">Log in</a>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="page">
    <p class="label-title">Problem you're solving</p>

    <div id="popupContainer" class="problemSave-wrapper">
      <p id="title"></p>
      <button id="saveBtn">Save</button>
    </div>
    <div id="success"></div>

    <p class="label-title" id="label-review"><span class="red-dot"></span> Problems to review today:</p>
    <div class="review-wrapper">
      <ul id="problem-container" style="font-size: 15px;"></ul>
    </div>

    <div id="bottom-page">
      <a href="https://tracker-frontend-81q6.onrender.com/" target="_blank" class="bottom-link">Open Leetcode Tracker website</a>
      <a href="#" class="bottom-link" id="logout">Log out</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
